services:
	postgres:
		image: postgres:16
		container_name: trisort_postgres
		restart: unless-stopped
		environment:
			POSTGRES_USER: ${POSTGRES_USER:-postgres}
			POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
			POSTGRES_DB: ${POSTGRES_DB:-trisort}
		ports:
			- "${POSTGRES_PORT:-5432}:5432"
		volumes:
			- pgdata:/var/lib/postgresql/data
		healthcheck:
			test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-trisort}"]
			interval: 5s
			timeout: 5s
			retries: 12

	app:
		build:
			context: .
			dockerfile: Dockerfile
		container_name: trisort_app
		depends_on:
			postgres:
				condition: service_healthy
		env_file:
			- .env
		volumes:
			- ./:/workspace
		working_dir: /workspace
		command: ["sleep", "infinity"]

volumes:
	pgdata:
